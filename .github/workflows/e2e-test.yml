name: E2E Test

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - feature/**
    paths-ignore:
      - "**.md"
      - "python/**"

jobs:
  e2e-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config cmake libx11-dev ffmpeg
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ubuntu-24.04
          toolchain: stable
      - run: cargo build
      - uses: astral-sh/setup-uv@v7
      - name: Run e2e tests
        run: |
          uv sync
          uv run pytest -v
        working-directory: e2e-tests

  slack_notify:
    needs:
      - e2e-test
    permissions:
      actions: read
    timeout-minutes: 20
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: hisui
          notify_mode: failure_and_fixed
        env:
          GH_TOKEN: ${{ github.token }}

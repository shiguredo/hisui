name: PyPI Build and Publish

on:
  workflow_dispatch:
  push:
    branches:
      - feature/pypi
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-wheel:
    name: Build manylinux wheels
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config yasm cmake

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Build with cargo
        run: cargo build --release

      - name: Setup Python version for packaging
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # canary.N を .devN に変換
            if [[ "$TAG" == *"-canary."* ]]; then
              PYTHON_VERSION="${TAG/-canary./.dev}"
            else
              PYTHON_VERSION="$TAG"
            fi
          else
            # タグ以外のビルドでは開発バージョンを使用
            COMMIT_SHA="${GITHUB_SHA::8}"
            PYTHON_VERSION="0.0.0.dev${COMMIT_SHA}"
          fi
          echo "Python package version will be: $PYTHON_VERSION"
          # pyproject.toml のバージョンを更新
          cp pyproject.toml pyproject.toml.backup
          sed -i "s/^version = .*/version = \"$PYTHON_VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml:"
          head -n 5 pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - run: uv tool install maturin
      - name: Build wheel with Maturin
        run: uv run maturin build --release

      - name: Restore original pyproject.toml
        run: |
          if [ -f pyproject.toml.backup ]; then
            mv pyproject.toml.backup pyproject.toml
          fi

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.arch }}
          path: target/wheels/*.whl

  macos-wheel:
    name: Build macOS wheels
    strategy:
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-15
            arch: arm64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install packages to build external dependencies
        run: |
          brew update
          brew install meson nasm yasm automake autoconf libtool

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Build with cargo
        run: cargo build --release

      - name: Setup Python version for packaging
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # canary.N を .devN に変換
            if [[ "$TAG" == *"-canary."* ]]; then
              PYTHON_VERSION="${TAG/-canary./.dev}"
            else
              PYTHON_VERSION="$TAG"
            fi
          else
            # タグ以外のビルドでは開発バージョンを使用
            COMMIT_SHA="${GITHUB_SHA::8}"
            PYTHON_VERSION="0.0.0.dev${COMMIT_SHA}"
          fi
          echo "Python package version will be: $PYTHON_VERSION"
          # pyproject.toml のバージョンを更新
          cp pyproject.toml pyproject.toml.backup
          # macOS の sed は -i オプションが異なる
          sed -i '' "s/^version = .*/version = \"$PYTHON_VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml:"
          head -n 5 pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - run: uv tool install maturin
      - name: Build wheel with Maturin
        run: uv run maturin build --release

      - name: Restore original pyproject.toml
        run: |
          if [ -f pyproject.toml.backup ]; then
            mv pyproject.toml.backup pyproject.toml
          fi

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.arch }}
          path: target/wheels/*.whl

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux-wheel, macos-wheel]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      # テスト用
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      # 本番用
      # - name: Publish package to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1

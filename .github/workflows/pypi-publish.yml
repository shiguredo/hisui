name: PyPI Build and Publish

on:
  workflow_dispatch:
  push:
    branches:
      - feature/pypi
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-wheel:
    name: Build manylinux wheels
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version in Cargo.toml for Python compatibility
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # canary.N を .devN に変換
          if [[ "$TAG" == *"-canary."* ]]; then
            PYTHON_VERSION="${TAG/-canary./.dev}"
          else
            PYTHON_VERSION="$TAG"
          fi
          # Cargo.toml のバージョンを更新（maturin が自動で読み取る）
          sed -i "s/^version = .*/version = \"$PYTHON_VERSION\"/" Cargo.toml
          echo "Updated Cargo.toml version to: $PYTHON_VERSION"
          grep "^version = " Cargo.toml

      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config yasm cmake

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Build with cargo
        run: cargo build --release

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - run: uv tool install maturin
      - name: Build wheel with Maturin
        run: uv run maturin build --release

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.arch }}
          path: target/wheels/*.whl

  macos-wheel:
    name: Build macOS wheels
    strategy:
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-15
            arch: arm64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version in Cargo.toml for Python compatibility
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # canary.N を .devN に変換
          if [[ "$TAG" == *"-canary."* ]]; then
            PYTHON_VERSION="${TAG/-canary./.dev}"
          else
            PYTHON_VERSION="$TAG"
          fi
          # Cargo.toml のバージョンを更新（maturin が自動で読み取る）
          # macOS の sed は -i オプションが異なる
          sed -i '' "s/^version = .*/version = \"$PYTHON_VERSION\"/" Cargo.toml
          echo "Updated Cargo.toml version to: $PYTHON_VERSION"
          grep "^version = " Cargo.toml

      - name: Install packages to build external dependencies
        run: |
          brew update
          brew install meson nasm yasm automake autoconf libtool

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Build with cargo
        run: cargo build --release

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - run: uv tool install maturin
      - name: Build wheel with Maturin
        run: uv run maturin build --release

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.arch }}
          path: target/wheels/*.whl

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux-wheel, macos-wheel]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      # テスト用
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      # 本番用
      # - name: Publish package to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1

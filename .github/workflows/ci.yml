name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "develop"
      - "feature/**"
    paths-ignore:
      - "**.md"
      - "python/**"
      - ".github/workflows/pypi-publish.yml"
  schedule:
    # UTC の 01:00 は JST だと 10:00 。
    # 1-5 で 月曜日から金曜日
    - cron: "0 1 * * 1-5"

env:
  RUST_BACKTRACE: 1
  CUDA_VERSION: 13.0.2

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config yasm cmake libx11-dev
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ubuntu-24.04
          toolchain: stable
      - run: cargo fmt --all --check
      - run: cargo check --workspace --exclude shiguredo_fdk_aac --exclude shiguredo_audio_toolbox
      - run: cargo clippy --workspace --all-targets --exclude shiguredo_fdk_aac --exclude shiguredo_audio_toolbox -- --deny warnings
      - run: cargo test --workspace --exclude shiguredo_fdk_aac --exclude shiguredo_audio_toolbox

  shiguredo-opus-symbol-rewrite:
    name: "shiguredo_opus Symbol Rewrite"
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - run: rustup component add llvm-tools
      - name: Install packages to build external dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - name: Install packages to build external dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew update
          brew install cmake ninja
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ${{ matrix.os }}
          toolchain: stable
      - run: cargo check -p shiguredo_opus
      - run: cargo test -p shiguredo_opus
      - name: Verify rewritten symbols
        shell: bash
        run: |
          latest_output=$(ls -1t target/debug/build/shiguredo_opus-*/output | head -n 1)
          link_search=$(grep '^cargo::rustc-link-search' "$latest_output" | tail -n 1 | sed 's/^cargo::rustc-link-search=//; s/^native=//')
          if [ -f "$link_search/libopus.a" ]; then
            lib_path="$link_search/libopus.a"
          elif [ -f "$link_search/opus.lib" ]; then
            lib_path="$link_search/opus.lib"
          else
            echo "failed to find static opus library under $link_search"
            exit 1
          fi

          host_triple=$(rustc -vV | awk '/^host:/{print $2}')
          sysroot=$(rustc --print sysroot)
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            llvm_nm="$sysroot/lib/rustlib/$host_triple/bin/llvm-nm.exe"
          else
            llvm_nm="$sysroot/lib/rustlib/$host_triple/bin/llvm-nm"
          fi

          "$llvm_nm" --defined-only --extern-only --format=just-symbols "$lib_path" > symbols.txt
          cat symbols.txt

          grep -Eq '^(_)?shiguredo_opus_encode_pulses$' symbols.txt
          grep -Eq '^(_)?shiguredo_opus_PITCH_XCORR_IMPL$' symbols.txt

          if grep -Eq '^(_)?encode_pulses$' symbols.txt; then
            echo "original symbol encode_pulses is still present"
            exit 1
          fi
          if grep -Eq '^(_)?PITCH_XCORR_IMPL$' symbols.txt; then
            echo "original symbol PITCH_XCORR_IMPL is still present"
            exit 1
          fi

  test-nvidia-video-codec:
    runs-on:
      group: Self
      labels: [self-hosted, linux, x64, NVIDIA-Video-Codec-SDK]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: Update PATH
        run: echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV
      - run: cargo check --no-default-features --features nvcodec -p hisui
      - run: cargo clippy --no-default-features --features nvcodec -p hisui -- --deny warnings
      - run: cargo test --no-default-features --features nvcodec -p hisui -- --test-threads=1

  test-apple-toolbox:
    runs-on:
      group: Self
      labels: [self-hosted, macOS, ARM64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: 🍺 Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: Update PATH
        run: echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV
      - name: Install packages to build external dependencies
        run: |
          brew update
          brew install meson ninja nasm yasm cmake automake autoconf libtool pkg-config
      - run: cargo check --no-default-features --workspace --exclude shiguredo_fdk_aac --exclude shiguredo_libvpx
      - run: cargo clippy --no-default-features --workspace --exclude shiguredo_fdk_aac --exclude shiguredo_libvpx -- --deny warnings
      - run: cargo test --no-default-features --workspace --exclude shiguredo_fdk_aac --exclude shiguredo_libvpx

  test-fdk-aac:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config yasm cmake libx11-dev libfdk-aac-dev
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ubuntu-24.04
          toolchain: stable
      - run: cargo test --package shiguredo_fdk_aac
      # shiguredo_fdk_aac はリリースビルドでだけセグフォすることがあったので、それもテストする
      # （最終的にはリリースバイナリを使った e2e で置き換えるべき）
      - run: cargo test --release --package shiguredo_fdk_aac
      - run: cargo test --no-default-features --features fdk-aac

      - run: cargo build --no-default-features --features fdk-aac
      - run: ldd target/debug/hisui
      - name: FDK-AAC が動的リンクされることを確認する
        run: ldd target/debug/hisui | grep fdk-aac

      - run: cargo build
      - run: ldd target/debug/hisui
      - name: FDK-AAC がリンクされないことを確認する
        run: if ldd target/debug/hisui | grep -q fdk-aac; then exit 1; else exit 0; fi

  test-openh264:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      OPENH264_VERSION: "2.6.0"
      OPENH264_PATH: ${{ github.workspace }}/libopenh264.so
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config yasm cmake libx11-dev
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ubuntu-24.04
          toolchain: stable
      - name: Download libopenh264 v${{ env.OPENH264_VERSION }}
        run: |
          curl -LO http://ciscobinary.openh264.org/libopenh264-${{ env.OPENH264_VERSION }}-linux64.8.so.bz2
          bzip2 -d libopenh264-${{ env.OPENH264_VERSION }}-linux64.8.so.bz2
          mv libopenh264-${{ env.OPENH264_VERSION }}-linux64.8.so ${{ env.OPENH264_PATH }}
      - run: cargo test --no-default-features -p hisui

  valgrind:
    # [NOTE]
    # Rust 1.93.0 に上がったタイミングで valgrind チェックが常に失敗するようになったので、その解決策が見つかるまでこのジョブはスキップする
    # 失敗例: https://github.com/shiguredo/hisui/actions/runs/21272612023/job/61225691502 )
    #
    # 上の結果を見ると、特定のテストでチェックがこけている、という感じではなく cargo test 自体と相性が悪そうにも見える
    if: false
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      OPENH264_VERSION: "2.6.0"
      OPENH264_PATH: ${{ github.workspace }}/libopenh264.so
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config yasm cmake libx11-dev valgrind libfdk-aac-dev
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ubuntu-24.04
          toolchain: stable
      - name: Download libopenh264 v${{ env.OPENH264_VERSION }}
        run: |
          curl -LO http://ciscobinary.openh264.org/libopenh264-${{ env.OPENH264_VERSION }}-linux64.8.so.bz2
          bzip2 -d libopenh264-${{ env.OPENH264_VERSION }}-linux64.8.so.bz2
          mv libopenh264-${{ env.OPENH264_VERSION }}-linux64.8.so ${{ env.OPENH264_PATH }}
      - run: cargo install cargo-valgrind || echo 'already installed'
      - name: Run valgrind tests
        env:
          VALGRINDFLAGS: --track-origins=yes --verbose --num-callers=50 --keep-debuginfo=yes
        # NOTE: SVT-AV1 の v3.1.2 では hisui 側では対処不可能そうなエラーが出ているので、いったん抑制している（TODO: 新バージョンが出たらまた対象に含めること）
        run: cargo valgrind test --workspace --exclude shiguredo_audio_toolbox --exclude shiguredo_svt_av1 -- --skip simple_single_source_av1

  ubuntu-binary:
    name: "Upload Binary for Ubuntu"
    needs: [ci]
    strategy:
      matrix:
        platform:
          - name: ubuntu-24.04_x86_64
            runs-on: ubuntu-24.04
          # TODO: webrtc-rs が ubuntu-24.04 arm64 をサポートしたら ubuntu-24.04_arm64 を復帰する
          # - name: ubuntu-24.04_arm64
          #   runs-on: ubuntu-24.04-arm
          - name: ubuntu-22.04_x86_64
            runs-on: ubuntu-22.04
          # TODO: webrtc-rs が ubuntu-22.04 arm64 をサポートしたら ubuntu-22.04_arm64 を復帰する
          # - name: ubuntu-22.04_arm64
          #   runs-on: ubuntu-22.04-arm
    runs-on: ${{ matrix.platform.runs-on }}
    timeout-minutes: 20
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install packages to build external dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm build-essential autoconf automake libtool pkg-config yasm cmake libx11-dev

      # CUDA のインストール (x86_64 のみ)
      - uses: shiguredo/github-actions/.github/actions/setup-cuda-toolkit@main
        if: contains(matrix.platform.name, 'x86_64')
        id: cuda
        with:
          cuda_version: ${{ env.CUDA_VERSION }}
          platform: ${{ matrix.platform.runs-on }}
      - run: rustup update stable
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ${{ matrix.platform.runs-on }}
          toolchain: stable

      # x86_64 では nvcodec feature を有効化
      - name: Build with NVCODEC (x86_64)
        if: contains(matrix.platform.name, 'x86_64')
        run: cargo build --release --features nvcodec

      # ARM では通常ビルド
      - name: Build (ARM)
        if: contains(matrix.platform.name, 'arm64')
        run: cargo build --release

      - name: Get the version
        id: get_version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "hisui") | .version')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - run: |
          mkdir -p hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}
          cp target/release/hisui hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}/
          tar -czf hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}.tar.gz \
            hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hisui-binary-${{ matrix.platform.name }}
          path: hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}.tar.gz

  macos-binary:
    name: "Upload Binary for MacOS"
    needs: [test-apple-toolbox]
    strategy:
      matrix:
        platform:
          - name: macos-26_arm64
            runs-on: macos-26
          - name: macos-15_arm64
            runs-on: macos-15
          - name: macos-14_arm64
            runs-on: macos-14
    runs-on: ${{ matrix.platform.runs-on }}
    timeout-minutes: 20
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Get the version
        id: get_version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "hisui") | .version')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - run: rustup update stable
      - name: Install packages to build external dependencies
        run: |
          brew update
          brew install meson nasm yasm automake autoconf libtool pkg-config
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ${{ matrix.platform.runs-on }}
          toolchain: stable
      - run: cargo build --release
      - run: |
          mkdir -p hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}
          cp target/release/hisui hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}/
          tar -czf hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}.tar.gz \
            hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hisui-binary-${{ matrix.platform.name }}
          path: hisui-${{ steps.get_version.outputs.version }}_${{ matrix.platform.name }}.tar.gz

  docs_rs:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DOCS_RS: 1
    steps:
      # docs.rs 向けでは外部ライブラリのビルドは走らないので依存パッケージなどのインストールは不要
      - uses: actions/checkout@v6
      - run: rustup update stable
      - run: cargo doc --workspace --exclude hisui

  slack_notify:
    needs:
      - ci
      - shiguredo-opus-symbol-rewrite
      - test-nvidia-video-codec
      - test-apple-toolbox
      - test-fdk-aac
      - test-openh264
      - ubuntu-binary
      - macos-binary
      # - valgrind  # スキップ中のため除外（TODO: valgrind ジョブのスキップをやめたらコメントアウトを外す）
      - valgrind
      - docs_rs
    permissions:
      actions: read
    timeout-minutes: 20
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: hisui
          notify_mode: failure_and_fixed
        env:
          GH_TOKEN: ${{ github.token }}

# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-yaml" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    entry = "cargo fmt --all -- --check",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 0,
  },
  # {
  #   id = "cargo-clippy",
  #   name = "cargo clippy",
  #   entry = "cargo clippy --all-targets --all-features -- -D warnings",
  #   language = "system",
  #   types = ["rust"],
  #   pass_filenames = false,
  #   priority = 10,
  # },
  {
    id = "ruff-e2e",
    name = "ruff (e2e-tests)",
    entry = "uv run --directory e2e-tests ruff check",
    language = "system",
    files = { glob = "e2e-tests/**/*.py" },
    pass_filenames = false,
    priority = 0,
  },
]
